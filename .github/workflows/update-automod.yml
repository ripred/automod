name: Update AutoMod Configuration

on:
  push:
    branches:
      - main
    paths:
      - 'automod/automoderator.yml'

permissions:
  contents: read

jobs:
  update-automod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PRAW
        run: |
          python -m pip install --upgrade pip
          pip install praw

      - name: Update AutoMod Configuration on Reddit
        run: python update_automod.py
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_SECRET: ${{ secrets.REDDIT_SECRET }}
          REDDIT_REFRESH_TOKEN: ${{ secrets.REDDIT_REFRESH_TOKEN }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          SUBREDDIT_NAME: ${{ secrets.SUBREDDIT_NAME }}
